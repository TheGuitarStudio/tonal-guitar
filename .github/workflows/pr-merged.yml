name: PR merged

# Note: moving the linked project item to "Done" is handled by the GitHub
# Project's built-in "item closed -> Done" automation. This workflow only
# closes task-group sub-issues of the parent issue(s) the merged PR closes.

on:
  pull_request:
    types: [closed]

jobs:
  close-sub-issues:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read
    steps:
      - name: Close task-group sub-issues of parent issues this PR closes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BODY: ${{ github.event.pull_request.body }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          parents=$(printf '%s' "$PR_BODY" | grep -oiE '(close[sd]?|fix(e[sd])?|resolve[sd]?) #[0-9]+' | grep -oE '[0-9]+' | sort -u)
          if [ -z "$parents" ]; then
            echo "No closing references in PR body."
            exit 0
          fi
          for parent in $parents; do
            gh issue list --repo "$REPO" --state open --limit 200 --json number,body \
              --jq ".[] | select(.body | test(\"\\\\*\\\\*Parent:\\\\*\\\\* #${parent}\\\\b\")) | .number" |
            while read -r sub; do
              echo "Closing sub-issue #${sub} (parent #${parent})"
              gh issue close "$sub" --repo "$REPO" \
                --comment "Closed automatically: parent #${parent} was resolved by PR #${PR_NUMBER}." \
                --reason completed
            done
          done
